spring.application.name=gamelog

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.liquibase.change-log=classpath:liquibase/master.xml

app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:3000,https://app.example.com}

server.servlet.session.timeout=30m
server.servlet.session.cookie.name=GAMELOG_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${APP_SECURITY_COOKIE_SECURE:false}
server.forward-headers-strategy=framework

spring.ai.openai.api-key=${OPENAI_API_KEY}