spring.application.name=gamelog

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.liquibase.change-log=classpath:liquibase/master.xml

app.security.allowed-origins=${APP_SECURITY_ALLOWED_ORIGINS:http://localhost:3000,https://app.example.com}
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:3000}
app.mail.from=${MAIL_FROM:${spring.mail.username}}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

server.servlet.session.timeout=30m
server.servlet.session.cookie.name=GAMELOG_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=${APP_SECURITY_COOKIE_SECURE:true}
server.forward-headers-strategy=framework

spring.ai.openai.api-key=${OPENAI_API_KEY}

rawg.api.key=${RAWG_API:}
rawg.api.base-url=${RAWG_API_BASE_URL:https://api.rawg.io/api}
rawg.api.timeout-ms=${RAWG_API_TIMEOUT_MS:5000}
rawg.api.min-interval-ms=${RAWG_API_MIN_INTERVAL_MS:3500}

app.translation.base-url=${APP_TRANSLATION_BASE_URL:}
app.translation.timeout-ms=${APP_TRANSLATION_TIMEOUT_MS:15000}
app.translation.connect-timeout-ms=${APP_TRANSLATION_CONNECT_TIMEOUT_MS:5000}
app.translation.retry-count=${APP_TRANSLATION_RETRY_COUNT:1}
app.translation.source-lang=${APP_TRANSLATION_SOURCE_LANG:en}
app.translation.target-lang=${APP_TRANSLATION_TARGET_LANG:pt}

app.image.vgchartz-base-url=${VGCHARTZ_BASE_URL:https://www.vgchartz.com}
app.image.default-url=${APP_IMAGE_DEFAULT_URL:https://www.vgchartz.com/games/boxart/default.jpg}